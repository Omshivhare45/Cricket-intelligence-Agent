services:
  - type: web
    name: cricket-intelligence-agent
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: GEMINI_API_KEY
        sync: false # Set your Gemini API Key in Render Dashboard
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
